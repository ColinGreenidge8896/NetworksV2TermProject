<!-- public/drive.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Drive Control</title>
    <link rel="stylesheet" href="/get_style/style.css">
    <script src="/get_script/drive.js"></script>
</head>
<body>
    <header>
        <h1>Drive Command Interface</h1>
    </header>

    <main style="text-align:center; margin-top:30px;">
        <form id="driveForm" onsubmit="return sendDrive();">
            <label>Direction:</label>
            <select id="direction">
                <option value="1">Forward</option>
                <option value="2">Backward</option>
                <option value="3">Right</option>
                <option value="4">Left</option>
            </select>
            <br><br>
            <label>Duration (sec):</label>
            <input type="number" id="duration" min="1" max="10" required>
            <br><br>
            <label>Speed (%):</label>
            <input type="number" id="speed" min="80" max="100" required>
            <br><br>
            <button type="submit">Send Drive Command</button>
        </form>
        <br>
        <pre id="driveResult" style="margin-top: 20px; background-color: #f4f4f4; padding: 12px; border: 1px solid #ccc;"></pre>
        <br>
        <a href="/"><button>Back to Status Page</button></a>
    </main>
</body>
</html>
